services:
  db:
    image: postgres:16
    container_name: nutrifit_pg
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Se quiser acesso externo ao banco, mapeie assim (será definido no .env):
    ports:
      - "${PG_PORT:-5433}:5432"
    # Se NÃO precisar acesso externo, pode remover o bloco 'ports' e deixar só:
    # expose: ["5432"]
    volumes:
      - pgdata_nutrifit:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [nutrifit_net]

  minio:
    image: quay.io/minio/minio
    container_name: nutrifit_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata_nutrifit:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [nutrifit_net]

  api:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: nutrifit_api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      SELF_MANAGED_PROFILE_ID: "00000000-0000-0000-0000-000000000004"
      PORT: "5051"
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-NutriFit <no-reply@nutrifit.app>}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-admin123}
      MINIO_BUCKET: ${MINIO_BUCKET_NAME:-nutrifit}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@nutrifit.app}
    ports:
      - "5051:5051"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5051/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [nutrifit_net]

  front:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${FRONT_API_URL}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    container_name: nutrifit_front
    depends_on:
      - api
    environment:
      VITE_API_URL: ${FRONT_API_URL}
      VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
    ports:
      - "5052:80"
    restart: unless-stopped
    networks: [nutrifit_net]

volumes:
  pgdata_nutrifit:
  miniodata_nutrifit:

networks:
  nutrifit_net:
    name: nutrifit_net
    driver: bridge
